apiVersion: apps/v1
kind: Deployment
metadata:
  name: leave-management-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leave-management
  template:
    metadata:
      labels:
        app: leave-management
    spec:
      containers:
      - name: leave-management
        image: your-dockerhub-username/leave-management-system:latest  # Replace with your Docker Hub image
        ports:
        - containerPort: 8082
        env:
        - name: PORT
          value: "8082"